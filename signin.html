<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — DocPlain AI</title>
<meta name="description" content="Sign in to your DocPlain AI account and generate US legal documents instantly."/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>"/>
<meta name="theme-color" content="#0a1628"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0a1628;--gold:#c9a84c;--gold-light:#f0d080;--cream:#faf8f3;--text:#1a1a2e;--muted:#6b7280;--white:#fff;--border:#e5e0d5;--green:#1a7a4a;--red:#c0392b}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{background:var(--navy);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.3rem;font-weight:700;text-decoration:none}
.logo span{color:var(--white)}
.nav-link{color:rgba(255,255,255,0.7);font-size:0.88rem;text-decoration:none}
.nav-link:hover{color:var(--gold)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem}
.container{width:100%;max-width:420px}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:2rem;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.card-header{text-align:center;margin-bottom:1.8rem}
.card-icon{font-size:2rem;margin-bottom:0.8rem}
.card-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--text);margin-bottom:0.4rem}
.card-sub{font-size:0.88rem;color:var(--muted)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:0.82rem;font-weight:500;margin-bottom:0.35rem;color:var(--text)}
.form-group input{width:100%;padding:0.75rem 1rem;border:1px solid var(--border);border-radius:8px;font-size:0.9rem;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);outline:none;transition:border-color 0.2s}
.form-group input:focus{border-color:var(--gold)}
.password-wrap{position:relative}
.password-wrap input{padding-right:2.5rem}
.toggle-pass{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.9rem}
.forgot{display:block;text-align:right;font-size:0.78rem;color:var(--gold);text-decoration:none;margin-top:4px}
.forgot:hover{text-decoration:underline}
.submit-btn{width:100%;background:var(--gold);color:var(--navy);border:none;padding:0.9rem;border-radius:10px;font-size:0.95rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:0.5rem;transition:all 0.2s}
.submit-btn:hover{background:var(--gold-light)}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:0.8rem;margin:1.2rem 0}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:0.78rem;color:var(--muted)}
.google-btn{width:100%;background:var(--white);border:1px solid var(--border);padding:0.8rem;border-radius:10px;font-size:0.9rem;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:0.6rem;transition:all 0.2s;color:var(--text)}
.google-btn:hover{border-color:var(--gold);background:var(--cream)}
.footer-text{text-align:center;font-size:0.82rem;color:var(--muted);margin-top:1.2rem}
.footer-text a{color:var(--gold);text-decoration:none;font-weight:500}
.error-box{background:#fff5f5;border:1px solid #fecaca;border-radius:8px;padding:0.75rem 1rem;color:var(--red);font-size:0.82rem;margin-top:0.8rem;display:none}
.error-box.show{display:block}
.success-box{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:0.75rem 1rem;color:var(--green);font-size:0.82rem;margin-top:0.8rem;display:none}
.success-box.show{display:block}
.spinner{width:16px;height:16px;border:2px solid rgba(10,22,40,0.3);border-top-color:var(--navy);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">DocPlain <span>AI</span></a>
  <a href="signup.html" class="nav-link">No account? Sign up free →</a>
</nav>
<div class="main">
  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="card-icon">⚖️</div>
        <div class="card-title">Welcome Back</div>
        <div class="card-sub">Sign in to your DocPlain AI account</div>
      </div>
      <button class="google-btn" onclick="signInWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        Continue with Google
      </button>
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">or sign in with email</div>
        <div class="divider-line"></div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="john@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Enter your password"/>
          <button class="toggle-pass" onclick="togglePassword('password',this)" type="button">👁️</button>
        </div>
        <a href="#" class="forgot" onclick="forgotPassword()">Forgot password?</a>
      </div>
      <button class="submit-btn" id=window.location.href = 'https://champion-man-51.clerk.accounts.dev/sign-up';="signIn()">
        Sign In to My Account
      </button>
      <div class="error-box" id="errorBox"></div>
      <div class="success-box" id="successBox"></div>
      <div class="footer-text">
        No account yet? <a href="signup.html">Create free account</a>
      </div>
    </div>
  </div>
</div>
<script>
const CLERK_KEY = 'pk_test_Y2hhbXBpb24tbWFuLTUxLmNsZXJrLmFjY291bnRzLmRldiQ';
let clerk;
async function initClerk() {
  try {
    clerk = new Clerk(CLERK_KEY);
    await clerk.load();
    if (clerk.user) window.location.href = 'generate.html';
  } catch(e) { console.log('Clerk error:', e); }
}
initClerk();
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁️'; }
}
async function signInWithGoogle() {
  try {
    await clerk.redirectToSignIn({strategy: 'oauth_google', redirectUrl: 'generate.html'});
  } catch(e) { showError('Google sign in failed. Please try email instead.'); }
}
async function signIn() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !email.includes('@')) { showError('Please enter a valid email address.'); return; }
  if (!password) { showError('Please enter your password.'); return; }
  hideError();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';
  try {
    const signInAttempt = await clerk.client.signIn.create({
      identifier: email, password
    });
    if (signInAttempt.status === 'complete') {
      await clerk.setActive({session: signInAttempt.createdSessionId});
      showSuccess('Signed in successfully! Redirecting...');
      setTimeout(() => window.location.href = 'generate.html', 1500);
    }
  } catch(err) {
    btn.disabled = false;
    btn.innerHTML = 'Sign In to My Account';
    const msg = err.errors?.[0]?.message || err.message || 'Invalid email or password. Please try again.';
    showError(msg);
  }
}
async function forgotPassword() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('Please enter your email address first.'); return; }
  try {
    await clerk.client.signIn.create({strategy: 'reset_password_email_code', identifier: email});
    showSuccess('Password reset email sent! Check your inbox.');
  } catch(e) { showError('Could not send reset email. Please check your email address.'); }
}
function showError(msg) { const b = document.getElementById('errorBox'); b.textContent = '⚠️ ' + msg; b.classList.add('show'); document.getElementById('successBox').classList.remove('show'); }
function hideError() { document.getElementById('errorBox').classList.remove('show'); }
function showSuccess(msg) { const b = document.getElementById('successBox'); b.textContent = '✅ ' + msg; b.classList.add('show'); document.getElementById('errorBox').classList.remove('show'); }
</script>
</body>
</html>
