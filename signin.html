<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — DocPlain AI</title>
<meta name="description" content="Sign in to your DocPlain AI account and generate US legal documents instantly."/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>"/>
<meta name="theme-color" content="#0a1628"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0a1628;--gold:#c9a84c;--gold-light:#f0d080;--cream:#faf8f3;--text:#1a1a2e;--muted:#6b7280;--white:#fff;--border:#e5e0d5;--green:#1a7a4a;--red:#c0392b}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{background:var(--navy);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.3rem;font-weight:700;text-decoration:none}
.logo span{color:var(--white)}
.nav-link{color:rgba(255,255,255,0.7);font-size:0.88rem;text-decoration:none}
.nav-link:hover{color:var(--gold)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem}
.container{width:100%;max-width:420px}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:2rem;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.card-header{text-align:center;margin-bottom:1.8rem}
.card-icon{font-size:2rem;margin-bottom:0.8rem}
.card-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--text);margin-bottom:0.4rem}
.card-sub{font-size:0.88rem;color:var(--muted)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:0.82rem;font-weight:500;margin-bottom:0.35rem;color:var(--text)}
.form-group input{width:100%;padding:0.75rem 1rem;border:1px solid var(--border);border-radius:8px;font-size:0.9rem;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);outline:none;transition:border-color 0.2s}
.form-group input:focus{border-color:var(--gold)}
.password-wrap{position:relative}
.password-wrap input{padding-right:2.5rem}
.toggle-pass{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.9rem}
.forgot{display:block;text-align:right;font-size:0.78rem;color:var(--gold);text-decoration:none;margin-top:4px;cursor:pointer}
.forgot:hover{text-decoration:underline}
.submit-btn{width:100%;background:var(--gold);color:var(--navy);border:none;padding:0.9rem;border-radius:10px;font-size:0.95rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:0.5rem;transition:all 0.2s}
.submit-btn:hover{background:var(--gold-light)}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed}
.error-box{background:#fff5f5;border:1px solid #fecaca;border-radius:8px;padding:0.75rem 1rem;color:var(--red);font-size:0.82rem;margin-top:0.8rem;display:none}
.error-box.show{display:block}
.success-box{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:0.75rem 1rem;color:var(--green);font-size:0.82rem;margin-top:0.8rem;display:none;line-height:1.6}
.success-box.show{display:block}
.footer-text{text-align:center;font-size:0.82rem;color:var(--muted);margin-top:1.2rem}
.footer-text a{color:var(--gold);text-decoration:none;font-weight:500}
.spinner{width:16px;height:16px;border:2px solid rgba(10,22,40,0.3);border-top-color:var(--navy);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">DocPlain <span>AI</span></a>
  <a href="signup.html" class="nav-link">No account? Sign up free →</a>
</nav>
<div class="main">
  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="card-icon">⚖️</div>
        <div class="card-title">Welcome Back</div>
        <div class="card-sub">Sign in to your DocPlain AI account</div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="john@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Enter your password"/>
          <button class="toggle-pass" onclick="togglePass()" type="button">👁️</button>
        </div>
        <span class="forgot" onclick="forgotPassword()">Forgot password?</span>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="signIn()">Sign In to My Account</button>
      <div class="error-box" id="errorBox"></div>
      <div class="success-box" id="successBox"></div>
      <div class="footer-text">No account yet? <a href="signup.html">Create free account</a></div>
    </div>
  </div>
</div>
<script>
const SUPABASE_URL='https://hlzhkyclcrhlejtomahh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsemhreWNsY3JobGVqdG9tYWhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDM0ODksImV4cCI6MjA5MzUxOTQ4OX0.OZcxlNH8I20VKSJwDGhdZJtgLC9mWgtW9iBPkwJPgzg';
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
function togglePass(){const i=document.getElementById('password');i.type=i.type==='password'?'text':'password';}
async function signIn(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  if(!email||!email.includes('@')){showError('Please enter a valid email address.');return;}
  if(!password){showError('Please enter your password.');return;}
  hideError();
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Signing in...';
  try{
    const{data,error}=await supabase.auth.signInWithPassword({email,password});
    if(error)throw error;
    showSuccess('✅ Signed in successfully! Redirecting you now...');
    setTimeout(()=>window.location.href='generate.html',1500);
  }catch(err){
    btn.disabled=false;
    btn.innerHTML='Sign In to My Account';
    if(err.message.includes('Invalid login')){showError('Wrong email or password. Please try again.');}
    else if(err.message.includes('Email not confirmed')){showError('Please verify your email first. Check your inbox for the verification link!');}
    else{showError(err.message||'Something went wrong. Please try again.');}
  }
}
async function forgotPassword(){
  const email=document.getElementById('email').value.trim();
  if(!email||!email.includes('@')){showError('Please enter your email address first then tap Forgot password.');return;}
  hideError();
  try{
    const{error}=await supabase.auth.resetPasswordForEmail(email,{redirectTo:'https://docplainai.vercel.app/signin.html'});
    if(error)throw error;
    showSuccess('📧 Password reset email sent! Check your inbox and follow the link to reset your password.');
  }catch(err){
    showError(err.message||'Could not send reset email. Please try again.');
  }
}
function showError(msg){const b=document.getElementById('errorBox');b.textContent='⚠️ '+msg;b.classList.add('show');document.getElementById('successBox').classList.remove('show');}
function hideError(){document.getElementById('errorBox').classList.remove('show');}
function showSuccess(msg){const b=document.getElementById('successBox');b.innerHTML=msg;b.classList.add('show');document.getElementById('errorBox').classList.remove('show');}
</script>
</body>
</html>
